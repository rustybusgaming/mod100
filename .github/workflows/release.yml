name: Release & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Get mod version
        id: version
        run: echo "version=$(grep '^mod_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Get Minecraft version
        id: mcversion
        run: echo "mc=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Find mod jar
        id: jar
        run: |
          JAR=$(find build/libs -name '*.jar' ! -name '*-sources.jar' | head -1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "Found jar: $JAR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Localized Weather v${{ steps.version.outputs.version }}
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.jar.outputs.path }}
          name: Localized Weather v${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: release
          loaders: fabric
          game-versions: ${{ steps.mcversion.outputs.mc }}
          dependencies: |
            fabric-api(required)
            better-clouds(optional)
            yet-another-config-lib(optional)
            modmenu(optional)

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.jar.outputs.path }}
          name: Localized Weather v${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: release
          loaders: fabric
          game-versions: ${{ steps.mcversion.outputs.mc }}
          dependencies: |
            fabric-api(required)
            better-clouds(optional)
            yet-another-config-lib(optional)
            modmenu(optional)
